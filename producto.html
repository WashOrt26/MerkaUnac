<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Detalle del Producto</title>
		<link rel="stylesheet" href="Styles/navbar.css" />
		<link rel="stylesheet" href="Styles/product.css" />
	</head>
	<body>
		<header class="top-bar">
			<button class="logo" onclick="window.location.href='index.html'">Marketplace</button>
			<input type="text" placeholder="Buscar productos..." />
			<div style="display: flex; gap: 10px;">
				<button class="auth-button" onclick="window.location.href='agregar-producto.html'" style="background-color: #28a745;">
					➕ Agregar Producto
				</button>
				<button class="auth-button" onclick="window.location.href='login.html'">
					Iniciar sesión / Registrarse
				</button>
			</div>
		</header>
		<div class="container-title"></div>
		<main>
			<div class="container-img">
				<img
					src=""
					alt="imagen-producto"
				/>
			</div>
			<div class="container-info-product">
				<div class="container-price">
					<span>$</span>
				</div>

				<div class="container-description">
					<div class="title-description">
						<h3>Descripción</h3>
					</div>
					<div class="text-description">
						<p></p>
					</div>
				</div>


				<button class="btn-volver" onclick="window.history.back()">
					← Volver
				</button>
			</div>
		</main>

		<script src="./productos.js"></script>
		<script src="./js/producto.js"></script>
	</body>
</html>
